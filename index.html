<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeRoom Python Academy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#home" class="nav-logo">
        <span class="logo-icon">🐍</span>
        <span class="logo-text">CodeRoom <span class="logo-accent">Python</span></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="#home" class="nav-link" data-page="home">Home</a>
        <a href="#syllabus" class="nav-link" data-page="syllabus">Syllabus</a>
        <a href="#lectures" class="nav-link" data-page="lectures">Lectures</a>
        <a href="#resources" class="nav-link" data-page="resources">Resources</a>
        <a href="#faq" class="nav-link" data-page="faq">FAQ</a>
        <a href="#founder" class="nav-link" data-page="founder">Founder</a>
        <a href="#contact" class="nav-link" data-page="contact">Contact</a>
      </div>
      <div class="nav-right">
        <div class="search-bar">
          <input type="text" id="globalSearch" placeholder="Search topics..." autocomplete="off" />
          <div class="search-results" id="searchResults"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark mode">
          <span class="theme-icon">☀️</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="app"></main>

  <!-- BACK TO TOP -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
